services:
  postgres:
    image: postgres:16-alpine
    container_name: drivee_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drivee_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      CHROMA_PATH: /data/chroma
      SEMANTIC_PATH: /app/semantic/drivee.yaml
      FEWSHOTS_PATH: /app/prompts/fewshots.yaml
      LLAMA_CPP_URL: ${LLAMA_CPP_URL:-http://host.docker.internal:8080/v1}
      LLAMA_CPP_MODEL: ${LLAMA_CPP_MODEL:-qwen2.5-coder}
      LLAMA_CPP_API_KEY: ${LLAMA_CPP_API_KEY:-sk-no-key}
      LLAMA_CPP_TIMEOUT_S: ${LLAMA_CPP_TIMEOUT_S:-120}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-/models/bge-m3_en_ru}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data/chroma
      - ./backend:/app
      - ${MODEL_DIR:-../model}:/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drivee_frontend
    environment:
      VITE_API_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pg_data:
  chroma_data:
